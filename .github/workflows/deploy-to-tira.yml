name: Publish to TIRA

on:
  workflow_dispatch:
    inputs:
      approach:
        description: "The retrieval engine to publish, is contained in the step-03-retrieval-approaches directory"
        required: true
        default: ""

jobs:
  deploy:
    runs-on: ${{ matrix.runner.os }}  
    timeout-minutes: 45
    strategy:
      fail-fast: true
      matrix:
        runner:
          - os: ubuntu-latest
#          - os: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Set up Dependencies
        uses: actions/setup-python@v4
      - name: Install TIRA Client
        run: |
          pip3 install 'git+https://github.com/tira-io/tira.git@rag4reports#subdirectory=python-client'

      - name: Publish to TIRA
        run: |
          tira-cli login --token ${{ secrets.TIRA_CLIENT_TOKEN }}
          tira-cli verify-installation --task lsr-benchmark --team reneuir-baselines
          tira-cli code-submission \
              --path step-03-retrieval-approaches/${{ inputs.directory }} \
              --task lsr-benchmark \
              --tira-vm-id reneuir-baselines \
              --dataset tiny-example-20251002_0-training \
              --command '/build-and-search-naive-index.py --dataset $inputDataset --use-u32 true --embedding $embeddings --output $outputDir' \
              --mount-directory '$embeddings=lsr-benchmark/lightning-ir/naver-splade-v3-doc' \
              --external-docker-registry ghcr.io/reneuir/lsr-benchmark/${{ inputs.directory }}
              --platform host

