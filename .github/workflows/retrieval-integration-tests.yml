name: Integration Tests

on:
  push: {}

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: true
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Set up Dependencies
        uses: actions/setup-python@v4
      - name: Install TIRA Client
        run: |
          pip3 install 'git+https://github.com/tira-io/tira.git@rag4reports#subdirectory=python-client'

      - name: Test naive-search
        run: |
          tira-cli code-submission \
              --path step-03-retrieval-approaches/naive-search/ \
              --task lsr-benchmark \
              --dataset tiny-example-20251002_0-training \
              --command '/build-and-search-naive-index.py --dataset $inputDataset --embedding $embeddings --output $outputDir' \
              --mount-directory '$embeddings=lsr-benchmark/lightning-ir/naver-splade-v3-doc' \
              --dry-run

      - name: Test kannolo
        run: |
          tira-cli code-submission \
              --path step-03-retrieval-approaches/kannolo/ \
              --task lsr-benchmark \
              --dataset tiny-example-20251002_0-training \
              --command '/build-and-search-kannolo-index.py --dataset $inputDataset --embedding $embeddings --output $outputDir' \
              --mount-directory '$embeddings=lsr-benchmark/lightning-ir/naver-splade-v3-doc' \
              --dry-run

      - name: Test seismic
        run: |
          tira-cli code-submission \
              --path step-03-retrieval-approaches/seismic/ \
              --task lsr-benchmark \
              --dataset tiny-example-20251002_0-training \
              --command '/build-and-search-seismic-index.py --dataset $inputDataset --embedding $embeddings --output $outputDir' \
              --mount-directory '$embeddings=lsr-benchmark/lightning-ir/naver-splade-v3-doc' \
              --dry-run
