name: Integration Tests

on:
  push: {}

jobs:
  tests:
    runs-on: ${{ matrix.runner.os }}  
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        runner:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
    steps:
